# Infraestrutura de desenvolvimento: apenas Postgres e MinIO.
# Apps no host: cd backend && npm run start:dev | cd frontend && npm start
#
# Uso: docker compose -f docker-compose-dev.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: food_postgres_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-food_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-food_pass}
      POSTGRES_DB: ${POSTGRES_DB:-food_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - food_postgres_data:/var/lib/postgresql/data
    networks:
      - food_dev_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-food_user} -d ${POSTGRES_DB:-food_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: food_minio_dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - food_minio_data:/data
    networks:
      - food_dev_network

networks:
  food_dev_network:
    driver: bridge

volumes:
  food_postgres_data:
  food_minio_data:
